enable-module-update = true
parallel-jobs = 1

[Duolingo]
app-name = "Duolingo"
patches-source = "hoo-dles/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
arch = "arm64-v8a"
patcher-args = """-Otype='Duolingo MAX'""
included-patches = "'Disable Login Integrity' 'Enable Premium'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/duolingo/"
uptodown-dlurl = "https://duolingo.en.uptodown.com/android"

[Duolingo.patch-options]
"Enable Premium" = { Type = "Duolingo MAX" }
